branching:
  primary: main
  feature: "kf/{trackId}"
  convention: trunk-based

commits:
  style: conventional
  format: "type: description"

tdd:
  strictness: strict

code_review:
  required: false

verification:
  checkpoints: track_completion_only

tracks:
  location: .agent/kf/tracks/
  registry: .agent/kf/tracks.yaml
  dependencies: .agent/kf/tracks/deps.yaml
