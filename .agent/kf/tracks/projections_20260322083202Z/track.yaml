id: projections_20260322083202Z
title: "Projections, queries, and subscriptions"
type: feature
status: pending
created: 2026-03-22
updated: 2026-03-22
spec:
  summary: |
    Projection engine (fold events into state), event querying by type/time
    range/predicate, and observer-pattern subscriptions for new events.
  context: |
    With the EventLog providing append and sync (track 2), consumers need
    to derive state from events and react to changes. The trip-planning
    project demonstrates this pattern: stamps (events) are projected into
    category progress and user score via pure fold functions.

    This track provides three capabilities:
    1. Projections — pure fold functions that replay events into state
    2. Queries — filter events by type, time range, or custom predicate
    3. Subscriptions — get notified when new events are appended
  codebase_analysis: |
    - Trip-planning useProgress() folds stamps → CategoryProgress[]
    - Trip-planning useScore() folds stamps → {xp, rank}
    - Both are pure functions of the event set — classic projections
    - EventLog.list() provides the full ordered event stream
    - EventLog.append() is the single write path — subscription hook here
    - drivestash onStatusChange provides sync status but not record-level
      change notifications, so subscriptions must be at the EventLog layer
  acceptance_criteria:
    - "project(events, projector) folds an event array into projected state"
    - "Projector interface: {init: State, apply: (state, event) => State}"
    - "EventLog.project(projector) replays all events through the projector"
    - "EventLog.query({type?, after?, before?, filter?}) returns matching events"
    - "Query supports filtering by event type (string match)"
    - "Query supports filtering by time range (after/before ISO timestamps)"
    - "Query supports custom predicate function"
    - "EventLog.subscribe(listener) notifies on each append"
    - "subscribe() returns an unsubscribe function"
    - "Subscriptions fire for local appends immediately"
    - "Subscriptions fire for events arriving via sync (new events not previously seen)"
  out_of_scope: |
    - Snapshot / materialized view caching (future track)
    - Persistent projections (re-computed on each call)
    - React hooks or framework bindings (separate package)
    - Real-time cross-client streaming
  technical_notes: |
    Projection interface:

      interface Projector<TState, TPayload = unknown> {
        readonly init: TState
        apply(state: TState, event: EventRecord<TPayload>): TState
      }

      function project<TState, TPayload>(
        events: EventRecord<TPayload>[],
        projector: Projector<TState, TPayload>
      ): TState {
        return events.reduce(
          (state, event) => projector.apply(state, event),
          projector.init
        )
      }

    Query interface:

      interface EventQuery<TPayload = unknown> {
        type?: string               // exact match on event type
        after?: string              // ISO timestamp lower bound (exclusive)
        before?: string             // ISO timestamp upper bound (exclusive)
        filter?: (event: EventRecord<TPayload>) => boolean
      }

    Subscription mechanism:
    - EventLog maintains a Set<EventListener> internally
    - append() notifies all listeners with the new event
    - After sync/pull, diff the event list to detect new arrivals and
      notify listeners for each new event (events not in the pre-sync set)
    - This requires tracking known event IDs (a Set<string>) and comparing
      after pull completes
