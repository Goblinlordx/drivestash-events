id: event-log_20260322083201Z
title: Append-only event log with multi-device sync
type: feature
status: pending
created: 2026-03-22
updated: '2026-03-22'
spec:
  summary: 'EventLog class wrapping drivestash SyncEngine with a custom union merge

    that guarantees append-only semantics and safe multi-device usage

    without clobbering.

    '
  context: 'This is the core of drivestash-events. The EventLog provides a simple

    interface for appending immutable events that sync safely across

    devices via drivestash. The key insight: since events are never

    modified (updatedAt is set once), drivestash''s LWW merge is equivalent

    to union merge — but we use an explicit union merge for clarity and

    safety.


    The trip-planning project''s stamp system demonstrated the pattern:

    optimistic local writes, pending queue for offline, union merge on

    sync. drivestash-events generalizes this into a reusable library.

    '
  codebase_analysis: "- drivestash createSyncEngine<T> accepts a custom merge function\n- SyncEngine provides put/list/sync/pull/push/onStatusChange/destroy\n\
    - Default lwwMerge compares updatedAt — since events are immutable,\n  this works as union merge, but an explicit union\
    \ merge is safer\n- drivestash auto-syncs on online/visibility events\n- LocalStore uses IndexedDB with id as keyPath\n\
    - DriveAdapter stores one JSON blob per storeName in appDataFolder\n- No tombstone support in drivestash — events are\
    \ append-only so\n  this limitation is actually a feature (events are never deleted)\n"
  acceptance_criteria:
  - EventLog.append(type, payload) creates and persists an immutable event
  - Appended events have unique IDs, monotonic timestamps, and device-scoped sequence numbers
  - Events cannot be modified or deleted after append (API enforces immutability)
  - Custom union merge combines events from multiple devices without data loss
  - EventLog.list() returns all events ordered by timestamp then deviceId
  - EventLog.sync()/pull()/push() delegate to underlying drivestash engine
  - EventLog.onStatusChange() exposes sync status
  - EventLog.destroy() cleans up resources
  - Two simulated devices appending concurrently produce a merged log with all events
  out_of_scope: '- Projections / replay (track 3)

    - Querying / filtering events (track 3)

    - Subscriptions to new events (track 3)

    - Snapshots (future track)

    - Real-time streaming between clients

    '
  technical_notes: "Architecture:\n\n  EventLog<TPayload>\n    ├── wraps createSyncEngine<EventRecord<TPayload>>()\n    ├──\
    \ custom merge: unionMerge (merge by unique ID, keep all)\n    ├── append(type, payload) → EventRecord\n    ├── list()\
    \ → EventRecord[] (sorted by timestamp, deviceId)\n    ├── sync() / pull() / push()\n    ├── onStatusChange(listener)\
    \ → unsubscribe\n    └── destroy()\n\nUnion merge implementation:\n  function unionMerge<T extends SyncRecord>(local:\
    \ T[], remote: T[]): T[] {\n    const merged = new Map<string, T>()\n    for (const r of local) merged.set(r.id, r)\n\
    \    for (const r of remote) merged.set(r.id, r)  // no overwrite needed — same id = same event\n    return Array.from(merged.values())\n\
    \  }\n\nThis is safe because:\n1. Event IDs are globally unique (crypto.randomUUID)\n2. Events are immutable (same ID\
    \ = identical content)\n3. Two devices can never produce the same UUID\n\nPer-device sequence counter:\n- Maintained in\
    \ a separate \"meta\" record or derived from local event count\n- Provides total ordering within a single device\n- Cross-device\
    \ ordering: compare timestamp, break ties with deviceId\n\nDevice ID:\n- Generated once per browser instance via crypto.randomUUID()\n\
    - Stored in localStorage (persists across sessions)\n- Passed via EventLogConfig or auto-generated\n"
