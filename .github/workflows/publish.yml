name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install -g npm@^11.10.0

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - run: npm publish --access public --provenance
